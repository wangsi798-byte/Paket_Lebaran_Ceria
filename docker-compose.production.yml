version: '3.8'

services:
  backend:
    image: ghcr.io/muji-dashboard/sipale-backend:latest
    container_name: sipale-backend-prod
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - .env.production
    volumes:
      - ./backend/uploads:/app/uploads
      - ./logs:/var/log/sipale
    depends_on:
      - mongodb
    networks:
      - sipale_network

  frontend:
    image: ghcr.io/muji-dashboard/sipale-frontend:latest
    container_name: sipale-frontend-prod
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    depends_on:
      - backend
    networks:
      - sipale_network

  mongodb:
    image: mongo:6.0
    container_name: sipale-mongodb-prod
    restart: always
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=sipale_prod
    volumes:
      - mongodb_data:/data/db
      - ./mongodb/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js
    networks:
      - sipale_network

  nginx:
    image: nginx:latest
    container_name: sipale-nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/sipale.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/letsencrypt
    depends_on:
      - backend
      - frontend
    networks:
      - sipale_network

  prometheus:
    image: prom/prometheus
    container_name: sipale-prometheus-prod
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - sipale_network

  grafana:
    image: grafana/grafana
    container_name: sipale-grafana-prod
    ports:
      - "3030:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - sipale_network

volumes:
  mongodb_data:
  grafana_data:
  ssl_data:

networks:
  sipale_network:
    driver: bridge